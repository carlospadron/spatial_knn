services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: spatial_knn_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: gis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  sedona:
    image: apache/sedona:latest
    container_name: spatial_knn_sedona
    depends_on:
      - postgres
    env_file: .env
    environment:
      DB_HOST: postgres
    ports:
      - "8888:8888"
      - "4040:4040"   # Spark UI
    volumes:
      - .:/home/jovyan/work
    working_dir: /home/jovyan/work

volumes:
  postgres_data:
